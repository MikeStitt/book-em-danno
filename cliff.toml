# git-cliff configuration — generates CHANGELOG.md from conventional commits.
# See the constitution's "Conventional Commits" + "Branch & Push Policy": commits
# are the source of truth, this file just shapes them into a changelog.

[changelog]
header = """
# Changelog

All notable changes to `danno` (book-em-danno). Generated from conventional
commits by [git-cliff](https://git-cliff.org).\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Map conventional-commit types to changelog sections, in display order.
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^docs", group = "Documentation" },
    { message = "^test", group = "Testing" },
    { message = "^build", group = "Build System" },
    { message = "^ci", group = "CI" },
    { message = "^revert", group = "Revert" },
    { message = "^(chore|style)", skip = true },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
