# Pre-commit hooks, run via prek (a fast drop-in for the pre-commit runner).
# The full gate is `ninja check` (ruff + mypy + pytest); these hooks are the fast
# subset. `.docs/` is exempt from doc-quality hooks so the living plan/status
# tracker can be committed freely (see .markdownlintignore).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^\.docs/
      - id: end-of-file-fixer
        exclude: ^\.docs/
      - id: check-merge-conflict
      - id: check-yaml

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        exclude: ^\.docs/

  # Python gate (src/ + tests/). mypy + pytest run via `ninja check` (not in
  # pre-commit) so the hook stays fast.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
      - id: ruff-format
        args: [--check]
