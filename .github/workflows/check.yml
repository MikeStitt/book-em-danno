name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install tools (shellcheck, shfmt, bats)
        run: brew install shellcheck shfmt bats-core

      - name: make check
        run: make check
