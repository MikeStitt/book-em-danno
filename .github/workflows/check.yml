name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install ninja
        shell: bash
        run: |
          set -euo pipefail
          if [ "${RUNNER_OS}" = "macOS" ]; then
            brew install ninja
          else
            sudo apt-get update -qq
            sudo apt-get install -y ninja-build
          fi
          ninja --version

      - name: Sync dependencies
        # --locked fails the run if uv.lock is out of date with pyproject.toml,
        # so version drift surfaces in CI instead of hiding.
        run: uv sync --locked --all-extras --dev

      - name: ninja check
        run: ninja check
