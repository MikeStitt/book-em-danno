name: release-prepare

# Lane B, step 1 of 2 — the only human action that starts a release.
#
# Triggered by hand from the Actions tab ("Run workflow"). It computes the next
# version from the conventional-commit history with `git cliff --bumped-version`,
# bumps `pyproject.toml`, regenerates `CHANGELOG.md`, and opens a
# `chore(release): vX.Y.Z` PR. No version number is typed and no tag is created
# here — merging that PR is what publishes (see release.yml).
#
# Full process + prerequisites: plans/releasing.md.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. 1.4.0). Leave blank to auto-compute from commits."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      # RELEASE_TOKEN (a PAT or GitHub App token with contents + PR write) is
      # required so the pushed branch / opened PR actually trigger check.yml.
      # The default GITHUB_TOKEN cannot: events it raises do not start other
      # workflow runs, so required status checks would never run and the release
      # PR could never satisfy the protect-main ruleset. Fail loud if it is unset.
      - name: Verify RELEASE_TOKEN is configured
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "${RELEASE_TOKEN}" ]; then
            echo "::error::secrets.RELEASE_TOKEN is not set. See plans/releasing.md (Prerequisites)." >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so git-cliff can compute the bump
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Compute next version
        id: version
        env:
          OVERRIDE: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${OVERRIDE}" ]; then
            VERSION="${OVERRIDE#v}"
          else
            VERSION="$(git cliff --bumped-version)"
            VERSION="${VERSION#v}"
          fi
          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Tag ${TAG} already exists — nothing to release." >&2
            exit 1
          fi
          echo "version=${VERSION}" >>"${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >>"${GITHUB_OUTPUT}"
          echo "Next release: ${TAG}"

      - name: Bump pyproject.toml + regenerate changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          # Replace only the first `version = "…"` (the [project] version).
          awk -v v="${VERSION}" '/^version = / && !done {print "version = \"" v "\""; done=1; next} {print}' \
            pyproject.toml >pyproject.toml.tmp && mv pyproject.toml.tmp pyproject.toml
          # Render the changelog with the about-to-be-released commits under TAG.
          git cliff --tag "${TAG}" -o CHANGELOG.md
          grep -q "^version = \"${VERSION}\"" pyproject.toml

      - name: Open release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          BRANCH="release/${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "${BRANCH}"
          git commit -am "chore(release): ${TAG}"
          git push -u origin "${BRANCH}" --force-with-lease
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(release): ${TAG}" \
            --body "Automated release prep for **${TAG}** (see plans/releasing.md).

          - Bumps \`pyproject.toml\` to \`${VERSION}\`
          - Regenerates \`CHANGELOG.md\` from conventional commits

          Merging this PR publishes the GitHub Release via \`release.yml\` — no manual tag push."
